<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>local-pm</title>
    <style>
      :root {
        --bg: #0e1116;
        --panel: #161b22;
        --border: #2a3038;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #2f81f7;
        --green: #3fb950;
        --red: #f85149;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: baseline;
        gap: 16px;
      }
      header h1 { margin: 0; font-size: 18px; }
      header a { color: var(--accent); text-decoration: none; }
      main { padding: 16px 24px; }
      .banner {
        background: var(--panel);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        padding: 10px 14px;
        border-radius: 6px;
        margin-bottom: 16px;
      }
      .banner.hidden { display: none; }
      .project { margin-bottom: 20px; }
      .project h2 { font-size: 13px; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; }
      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 6px;
      }
      .row.active { border-color: var(--green); }
      .row .branch { font-weight: 600; min-width: 160px; }
      .row .path { color: var(--muted); font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .running { color: var(--green); font-size: 12px; white-space: nowrap; }
      .running-section h2 { font-size: 13px; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; display: flex; align-items: center; gap: 12px; }
      .row .port { color: var(--green); font-size: 12px; white-space: nowrap; }
      .console { margin: 0 0 6px; }
      button {
        font: inherit;
        padding: 5px 14px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #21262d;
        color: var(--text);
        cursor: pointer;
      }
      button.start { border-color: var(--accent); }
      button.stop { border-color: var(--red); color: var(--red); }
      a.open {
        font: inherit;
        padding: 5px 14px;
        border-radius: 6px;
        border: 1px solid var(--accent);
        background: #21262d;
        color: var(--accent);
        cursor: pointer;
        text-decoration: none;
        white-space: nowrap;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .cmd-form { display: flex; gap: 6px; flex-shrink: 0; }
      .cmd-form input[type="text"] {
        font: inherit;
        padding: 4px 8px;
        background: #010409;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        width: 180px;
      }
      .cmd-form input[type="text"]:focus { outline: none; border-color: var(--accent); }
      .cmd-form input[type="text"]:disabled { opacity: 0.5; }
      .add-project {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px 14px;
        margin-bottom: 20px;
      }
      .add-project h2 { font-size: 13px; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; }
      .add-row { display: flex; gap: 8px; }
      .add-row input[type="text"] {
        flex: 1;
        font: inherit;
        padding: 5px 10px;
        background: #010409;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
      }
      .add-row input[type="text"]:focus { outline: none; border-color: var(--accent); }
      .add-error { color: var(--red); font-size: 13px; margin-top: 8px; min-height: 0; }
      .add-error:empty { display: none; }
      .setup-form {
        margin-top: 12px;
        padding: 12px;
        border: 1px dashed var(--border);
        border-radius: 6px;
      }
      .setup-form h3 { margin: 0 0 4px; font-size: 13px; }
      .setup-form p { margin: 0 0 10px; color: var(--muted); font-size: 12px; }
      .setup-form label { display: block; font-size: 12px; color: var(--muted); margin: 8px 0 4px; }
      .setup-form input[type="text"] {
        width: 100%;
        font: inherit;
        padding: 5px 10px;
        background: #010409;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
      }
      .setup-form input[type="text"]:focus { outline: none; border-color: var(--accent); }
      .setup-form .actions { margin-top: 12px; display: flex; gap: 8px; }
      .devcmd { color: var(--muted); font-size: 12px; white-space: nowrap; }
      .devcmd code { color: var(--text); }
      .row-icons { display: flex; gap: 4px; }
      button.icon { padding: 5px 9px; }
      button.icon.remove { border-color: var(--red); color: var(--red); }
      .logs {
        margin-top: 24px;
      }
      .logs h2 { font-size: 13px; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; }
      .auth-error {
        background: var(--panel);
        border: 1px solid var(--border);
        border-left: 3px solid var(--red);
        padding: 12px 14px;
        border-radius: 6px;
        color: var(--muted);
      }
      .auth-error code { color: var(--text); }
      pre {
        background: #010409;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
        margin: 0;
        height: 300px;
        overflow: auto;
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .overlay.hidden { display: none; }
      .overlay-panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 32px;
        width: 100%;
        max-width: 400px;
      }
      .overlay-panel h2 { margin: 0 0 8px; font-size: 16px; }
      .overlay-panel p { margin: 0 0 16px; color: var(--muted); font-size: 13px; }
      .overlay-panel input[type="text"] {
        width: 100%;
        font: inherit;
        padding: 8px 10px;
        background: #010409;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        margin-bottom: 12px;
      }
      .overlay-panel input[type="text"]:focus { outline: none; border-color: var(--accent); }
      .overlay-error {
        color: var(--red);
        font-size: 13px;
        margin-bottom: 12px;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <div id="loginOverlay" class="overlay hidden">
      <div class="overlay-panel">
        <h2>local-pm</h2>
        <p>Paste your Bearer token to continue. The full value is printed once when the server first starts.</p>
        <input id="tokenInput" type="text" placeholder="Token" autocomplete="off" />
        <div id="overlayError" class="overlay-error"></div>
        <button id="tokenSubmit" style="width:100%;border-color:var(--accent)">Log in</button>
      </div>
    </div>
    <header>
      <h1>local-pm</h1>
      <span id="lanUrl"></span>
      <span style="flex:1"></span>
      <a id="forgetLink" href="#" style="font-size:13px;color:var(--muted)">forget token</a>
    </header>
    <main>
      <div id="running" class="running-section"></div>
      <div id="addProject" class="add-project">
        <h2>Add project</h2>
        <div class="add-row">
          <input id="addPath" type="text" placeholder="C:/path/to/project folder" autocomplete="off" />
          <button id="addBtn" class="start">Add</button>
        </div>
        <div id="addError" class="add-error"></div>
        <div id="addSetup"></div>
      </div>
      <div id="projects"></div>
    </main>
    <script type="module">
      let inFlight = false;

      const TOKEN_KEY = 'lpm-token';
      let TOKEN = '';

      function getStoredToken() {
        return localStorage.getItem(TOKEN_KEY) ?? '';
      }

      function setStoredToken(value) {
        localStorage.setItem(TOKEN_KEY, value);
        TOKEN = value;
      }

      function clearStoredToken() {
        localStorage.removeItem(TOKEN_KEY);
        TOKEN = '';
      }

      const hashToken = new URLSearchParams(location.hash.slice(1)).get('token');
      if (hashToken) {
        setStoredToken(hashToken);
        history.replaceState(null, '', location.pathname + location.search);
      } else {
        TOKEN = getStoredToken();
      }

      class AuthError extends Error {}

      function authHeaders(extra = {}) {
        return { Authorization: 'Bearer ' + TOKEN, ...extra };
      }

      async function fetchState() {
        const res = await fetch('/api/state', { headers: authHeaders() });
        if (res.status === 401) throw new AuthError('unauthorized');
        return res.json();
      }

      // Configured projects (root/type/devCmd) — the source of Edit/Remove and
      // the devCmd shown on each worktree row. Refreshed on each poll alongside state.
      let projectsByName = new Map();
      let projectsByRoot = new Map();

      async function fetchProjects() {
        const res = await fetch('/api/projects', { headers: authHeaders() });
        if (res.status === 401) throw new AuthError('unauthorized');
        const body = await res.json();
        projectsByName = new Map();
        projectsByRoot = new Map();
        for (const p of body.projects ?? []) {
          projectsByName.set(p.name, p);
          projectsByRoot.set(p.root, p);
        }
      }

      async function post(url, body) {
        inFlight = true;
        render(lastState, true);
        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: authHeaders({ 'Content-Type': 'application/json' }),
            body: body ? JSON.stringify(body) : undefined,
          });
          if (res.status === 401) throw new AuthError('unauthorized');
          lastState = await fetchState();
        } catch (err) {
          if (err instanceof AuthError) return renderAuthError();
          throw err;
        } finally {
          inFlight = false;
          render(lastState);
        }
      }

      // Generic JSON request for non-POST project verbs (DELETE/PATCH). Unlike
      // `post`, it returns the parsed body so callers can read the detection result.
      async function apiSend(method, url, body) {
        const res = await fetch(url, {
          method,
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: body ? JSON.stringify(body) : undefined,
        });
        if (res.status === 401) throw new AuthError('unauthorized');
        const parsed = await res.json().catch(() => ({}));
        return { ok: res.ok, status: res.status, body: parsed };
      }

      async function refreshAfterMutation() {
        try {
          await fetchProjects();
          lastState = await fetchState();
          render(lastState);
        } catch (err) {
          if (err instanceof AuthError) return renderAuthError();
          throw err;
        }
      }

      function showLoginOverlay(errorMsg = '') {
        document.getElementById('overlayError').textContent = errorMsg;
        document.getElementById('tokenInput').value = '';
        document.getElementById('loginOverlay').classList.remove('hidden');
        document.getElementById('tokenInput').focus();
      }

      function hideLoginOverlay() {
        document.getElementById('loginOverlay').classList.add('hidden');
      }

      async function submitToken() {
        const candidate = document.getElementById('tokenInput').value.trim();
        if (!candidate) {
          document.getElementById('overlayError').textContent = 'Token cannot be empty.';
          return;
        }
        const btn = document.getElementById('tokenSubmit');
        btn.disabled = true;
        try {
          const res = await fetch('/api/state', {
            headers: { Authorization: 'Bearer ' + candidate },
          });
          if (res.status === 401) {
            document.getElementById('overlayError').textContent = 'Invalid token — try again.';
            return;
          }
          if (!res.ok) {
            document.getElementById('overlayError').textContent = 'Server error — try again.';
            return;
          }
          setStoredToken(candidate);
          lastState = await res.json();
          try { await fetchProjects(); } catch { /* projects load is non-fatal at login */ }
          hideLoginOverlay();
          render(lastState);
          startPolling();
        } catch {
          document.getElementById('overlayError').textContent = 'Could not reach server.';
        } finally {
          btn.disabled = false;
        }
      }

      function renderAuthError() {
        if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
        showLoginOverlay('Session expired — please log in again.');
      }

      function groupByProject(worktrees) {
        const map = new Map();
        for (const w of worktrees) {
          if (!map.has(w.project)) map.set(w.project, []);
          map.get(w.project).push(w);
        }
        return map;
      }

      // Set of worktree paths whose console panel is currently open. Logs are
      // fetched lazily — only while a panel is open — so idle servers cost nothing.
      const openConsoles = new Set();
      let consoleInterval = null;

      function runningPaths(state) {
        return new Set((state.running ?? []).map((r) => r.path));
      }

      function lanUrlForPort(state, port) {
        if (port == null) return state.lanUrl;
        return state.lanUrl.replace(/:\d+$/, ':' + port);
      }

      async function refreshConsole(path) {
        const pre = document.querySelector(`pre[data-console="${CSS.escape(path)}"]`);
        if (!pre) return;
        // PRD 2: replace poll with WebSocket stream (node-pty+xterm.js) — out of scope here
        const res = await fetch('/api/logs?path=' + encodeURIComponent(path), { headers: authHeaders() });
        if (res.status === 401) return renderAuthError();
        const body = await res.json();
        const atBottom = pre.scrollTop + pre.clientHeight >= pre.scrollHeight - 20;
        pre.textContent = (body.logs ?? []).join('\n');
        if (atBottom) pre.scrollTop = pre.scrollHeight;
      }

      function pollConsoles() {
        for (const path of openConsoles) refreshConsole(path);
      }

      function ensureConsolePolling() {
        if (consoleInterval || openConsoles.size === 0) return;
        consoleInterval = setInterval(pollConsoles, 2000);
      }

      function stopConsolePolling() {
        if (openConsoles.size === 0 && consoleInterval) {
          clearInterval(consoleInterval);
          consoleInterval = null;
        }
      }

      function toggleConsole(path) {
        if (openConsoles.has(path)) openConsoles.delete(path);
        else openConsoles.add(path);
        stopConsolePolling();
        render(lastState);
        ensureConsolePolling();
        if (openConsoles.has(path)) refreshConsole(path);
      }

      function makeRunningRow(state, srv) {
        const row = document.createElement('div');
        row.className = 'row active';
        const url = lanUrlForPort(state, srv.port);
        row.innerHTML =
          `<span class="branch">${srv.branch ?? srv.path}</span>` +
          `<span class="port">● ${srv.port != null ? 'port ' + srv.port : 'running'}</span>` +
          `<span class="path" title="${srv.path}">${srv.path}</span>`;
        const open = makeOpenLink(url);
        row.appendChild(open);
        const consoleBtn = document.createElement('button');
        consoleBtn.textContent = openConsoles.has(srv.path) ? 'Hide console' : 'Open console';
        consoleBtn.onclick = () => toggleConsole(srv.path);
        row.appendChild(consoleBtn);
        const stop = document.createElement('button');
        stop.className = 'stop';
        stop.textContent = 'Stop';
        stop.onclick = () => post('/api/stop', { path: srv.path });
        row.appendChild(stop);
        return row;
      }

      function makeConsolePanel(path) {
        const pre = document.createElement('pre');
        pre.className = 'console';
        pre.dataset.console = path;
        return pre;
      }

      function renderRunning(state) {
        const container = document.getElementById('running');
        container.innerHTML = '';
        const running = state.running ?? [];
        if (running.length === 0) return;
        const h2 = document.createElement('h2');
        h2.textContent = 'Running servers';
        const stopAllBtn = document.createElement('button');
        stopAllBtn.className = 'stop';
        stopAllBtn.textContent = 'Stop all';
        stopAllBtn.onclick = () => post('/api/stop');
        h2.appendChild(stopAllBtn);
        container.appendChild(h2);
        for (const srv of running) {
          container.appendChild(makeRunningRow(state, srv));
          if (openConsoles.has(srv.path)) container.appendChild(makeConsolePanel(srv.path));
        }
      }

      function makeCommandButton(w, c, busy) {
        const btn = document.createElement('button');
        btn.textContent = c.label;
        btn.onclick = () => post('/api/command', { path: w.path, cmd: c.cmd, label: c.label });
        btn.disabled = busy;
        return btn;
      }

      function makeFreeFormInput(w, busy) {
        const form = document.createElement('div');
        form.className = 'cmd-form';
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'custom command…';
        input.disabled = busy;
        input.dataset.cmdPath = w.path;
        const btn = document.createElement('button');
        btn.textContent = 'Run';
        btn.disabled = busy;
        function runFreeForm() {
          const value = input.value.trim();
          if (!value) return;
          if (!confirm('Run ' + value + ' in ' + w.branch + '?')) return;
          post('/api/command', { path: w.path, cmd: value, label: value });
        }
        btn.onclick = runFreeForm;
        input.addEventListener('keydown', e => { if (e.key === 'Enter') runFreeForm(); });
        form.appendChild(input);
        form.appendChild(btn);
        return form;
      }

      function makeOpenLink(lanUrl) {
        const link = document.createElement('a');
        link.className = 'open';
        link.href = lanUrl;
        link.target = '_blank';
        link.rel = 'noopener';
        link.textContent = 'Open';
        link.title = lanUrl;
        return link;
      }

      function makeRow(w, running, busy) {
        const isRunning = running.has(w.path);
        const row = document.createElement('div');
        row.className = 'row' + (isRunning ? ' active' : '');
        row.innerHTML =
          `<span class="branch">${w.branch}</span>` +
          `<span class="path" title="${w.path}">${w.path}</span>`;
        // A running server is controlled from the "Running servers" section above;
        // this row just shows its state. Stopped rows get Start + command controls.
        if (isRunning) {
          row.insertAdjacentHTML('beforeend', '<span class="running">● running</span>');
          return row;
        }
        // Show the command that Start will spawn so it is visible before any spawn.
        const project = projectsByName.get(w.project);
        const devCmd = project?.devCmd ?? 'npm run dev';
        const devSpan = document.createElement('span');
        devSpan.className = 'devcmd';
        devSpan.innerHTML = `starts: <code>${devCmd}</code>`;
        row.appendChild(devSpan);
        for (const c of w.commands ?? []) row.appendChild(makeCommandButton(w, c, busy));
        row.appendChild(makeFreeFormInput(w, busy));
        const btn = document.createElement('button');
        btn.className = 'start';
        btn.textContent = 'Start';
        btn.onclick = () => post('/api/start', { path: w.path });
        btn.disabled = busy;
        row.appendChild(btn);
        return row;
      }

      function captureFocusedFreeForm(container) {
        const el = document.activeElement;
        if (!el || !el.dataset || !el.dataset.cmdPath) return null;
        if (!container.contains(el)) return null;
        return {
          path: el.dataset.cmdPath,
          value: el.value,
          start: el.selectionStart,
          end: el.selectionEnd,
        };
      }

      function restoreFocusedFreeForm(container, saved) {
        if (!saved) return;
        const el = container.querySelector(`[data-cmd-path="${CSS.escape(saved.path)}"]`);
        if (!el) return;
        el.value = saved.value;
        el.focus();
        if (saved.start != null) el.setSelectionRange(saved.start, saved.end);
      }

      function renderProjects(state, busy) {
        const container = document.getElementById('projects');
        const focused = captureFocusedFreeForm(container);
        const running = runningPaths(state);
        container.innerHTML = '';
        for (const [project, worktrees] of groupByProject(state.worktrees)) {
          const section = document.createElement('div');
          section.className = 'project';
          section.appendChild(makeProjectHeader(projectsByName.get(project), project));
          for (const w of worktrees) section.appendChild(makeRow(w, running, busy));
          container.appendChild(section);
        }
        restoreFocusedFreeForm(container, focused);
      }

      // --- Add / edit project --------------------------------------------------

      function setAddError(msg) {
        document.getElementById('addError').textContent = msg ?? '';
      }

      function clearSetup() {
        document.getElementById('addSetup').innerHTML = '';
      }

      // Build an inline setup/edit form. `values` pre-fills the fields; `onSubmit`
      // receives the collected patch. Used both for the post-add setup fallback and
      // the per-project Edit button — same form, different seed values.
      function buildSetupForm({ title, hint, values, onSubmit, onCancel }) {
        const form = document.createElement('div');
        form.className = 'setup-form';
        const h3 = document.createElement('h3');
        h3.textContent = title;
        form.appendChild(h3);
        if (hint) {
          const p = document.createElement('p');
          p.textContent = hint;
          form.appendChild(p);
        }

        const nameLabel = document.createElement('label');
        nameLabel.textContent = 'Name';
        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.value = values.name ?? '';

        const devLabel = document.createElement('label');
        devLabel.textContent = 'Dev command';
        const devInput = document.createElement('input');
        devInput.type = 'text';
        devInput.placeholder = 'npm run dev';
        devInput.value = values.devCmd ?? '';

        const portsLabel = document.createElement('label');
        portsLabel.textContent = 'Port variables (comma-separated, e.g. APP_PORT,WS_HOST_PORT)';
        const portsInput = document.createElement('input');
        portsInput.type = 'text';
        portsInput.value = (values.portVars ?? []).map((v) => v.varName ?? v).join(', ');

        form.append(nameLabel, nameInput, devLabel, devInput, portsLabel, portsInput);

        const actions = document.createElement('div');
        actions.className = 'actions';
        const save = document.createElement('button');
        save.className = 'start';
        save.textContent = 'Save';
        save.onclick = () => {
          const portVars = portsInput.value
            .split(',')
            .map((s) => s.trim())
            .filter(Boolean)
            .map((varName) => ({ varName }));
          onSubmit({ name: nameInput.value.trim(), devCmd: devInput.value.trim(), portVars });
        };
        const cancel = document.createElement('button');
        cancel.textContent = 'Cancel';
        cancel.onclick = onCancel;
        actions.append(save, cancel);
        form.appendChild(actions);
        return form;
      }

      async function submitAddProject() {
        const input = document.getElementById('addPath');
        const folderPath = input.value.trim();
        if (!folderPath) return;
        setAddError('');
        clearSetup();
        try {
          const { ok, body } = await apiSend('POST', '/api/projects/add', { path: folderPath });
          if (!ok) {
            setAddError(body.error ?? 'Could not add project.');
            return;
          }
          input.value = '';
          const { project, detection } = body;
          // The chosen dev command MUST be visible before any Start — show the
          // setup form (pre-filled) whenever detection is inconclusive.
          if (detection.needsSetup) {
            const setup = buildSetupForm({
              title: `Set up ${project.name}`,
              hint: detection.devCmd
                ? 'Confirm the detected dev command and any port variables, then Save.'
                : 'No dev/start script was detected — enter the command to run, then Save.',
              values: { name: project.name, devCmd: detection.devCmd, portVars: detection.portVars },
              onSubmit: async (patch) => {
                await apiSend('PATCH', '/api/projects', { root: project.root, patch });
                clearSetup();
                refreshAfterMutation();
              },
              onCancel: () => { clearSetup(); refreshAfterMutation(); },
            });
            document.getElementById('addSetup').appendChild(setup);
          }
          refreshAfterMutation();
        } catch (err) {
          if (err instanceof AuthError) return renderAuthError();
          setAddError('Could not reach server.');
        }
      }

      function openEditForm(container, project) {
        const existing = container.querySelector('.setup-form');
        if (existing) { existing.remove(); return; }
        const form = buildSetupForm({
          title: `Edit ${project.name}`,
          values: { name: project.name, devCmd: project.devCmd, portVars: project.portVars },
          onSubmit: async (patch) => {
            await apiSend('PATCH', '/api/projects', { root: project.root, patch });
            refreshAfterMutation();
          },
          onCancel: () => { const f = container.querySelector('.setup-form'); if (f) f.remove(); },
        });
        container.appendChild(form);
      }

      function makeProjectHeader(project, projectName) {
        const h2 = document.createElement('h2');
        h2.textContent = projectName;
        if (!project) return h2;
        const icons = document.createElement('span');
        icons.className = 'row-icons';
        icons.style.marginLeft = 'auto';
        const edit = document.createElement('button');
        edit.className = 'icon';
        edit.title = 'Edit project';
        edit.textContent = '✎';
        const remove = document.createElement('button');
        remove.className = 'icon remove';
        remove.title = 'Remove project';
        remove.textContent = '×';
        icons.append(edit, remove);
        const wrap = document.createElement('div');
        wrap.style.display = 'flex';
        wrap.style.alignItems = 'center';
        wrap.appendChild(h2);
        wrap.appendChild(icons);
        edit.onclick = () => openEditForm(wrap.parentElement, project);
        remove.onclick = async () => {
          if (!confirm('Remove project ' + project.name + '?')) return;
          await apiSend('DELETE', '/api/projects', { root: project.root });
          refreshAfterMutation();
        };
        return wrap;
      }

      function render(state, busy = inFlight) {
        if (!state) return;
        const anyRunning = (state.running ?? []).length > 0;
        document.getElementById('lanUrl').innerHTML = anyRunning
          ? `<a href="${state.lanUrl}" target="_blank">${state.lanUrl}</a>`
          : `<span style="color:var(--muted)">dev url: ${state.lanUrl}</span>`;
        renderRunning(state);
        renderProjects(state, busy);
      }

      let lastState = null;
      let pollingInterval = null;

      async function tick() {
        if (!inFlight) {
          try {
            const [state] = await Promise.all([fetchState(), fetchProjects()]);
            lastState = state;
            render(lastState);
          } catch (err) {
            if (err instanceof AuthError) return renderAuthError();
            throw err;
          }
        }
      }

      function startPolling() {
        if (pollingInterval) return;
        tick();
        pollingInterval = setInterval(tick, 2000);
      }

      document.getElementById('addBtn').addEventListener('click', submitAddProject);
      document.getElementById('addPath').addEventListener('keydown', e => {
        if (e.key === 'Enter') submitAddProject();
      });
      document.getElementById('tokenSubmit').addEventListener('click', submitToken);
      document.getElementById('tokenInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') submitToken();
      });
      document.getElementById('forgetLink').addEventListener('click', e => {
        e.preventDefault();
        clearStoredToken();
        if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
        showLoginOverlay();
      });

      if (TOKEN) {
        startPolling();
      } else {
        showLoginOverlay();
      }
    </script>
  </body>
</html>
