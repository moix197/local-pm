<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>local-pm</title>
    <link href="/vendor/xterm.css" rel="stylesheet" />
    <link href="/css/app.css" rel="stylesheet" />
    <script src="/vendor/xterm.js"></script>
    <script src="/vendor/addon-fit.js"></script>
  </head>
  <body>
    <div id="loginOverlay" class="overlay hidden">
      <div class="overlay-panel">
        <h2>local-pm</h2>
        <p>Paste your Bearer token to continue. The full value is printed once when the server first starts.</p>
        <input id="tokenInput" type="text" placeholder="Token" autocomplete="off" />
        <div id="overlayError" class="overlay-error"></div>
        <button id="tokenSubmit" style="width:100%;border-color:var(--accent)">Log in</button>
      </div>
    </div>
    <header>
      <h1>local-pm</h1>
      <span id="lanUrl"></span>
      <span style="flex:1"></span>
      <button id="stopAllBtn" class="stop hidden">Stop all</button>
      <button id="addProjectBtn" class="start">＋ Add project</button>
      <a id="forgetLink" href="#" style="font-size:13px;color:var(--muted)">forget token</a>
    </header>
    <div class="app">
      <nav id="sidebar"></nav>
      <div class="main">
        <div id="selectionView"></div>
        <div id="terminals"></div>
      </div>
    </div>
    <div id="addModal" class="overlay hidden">
      <div class="overlay-panel">
        <div class="modal-head">
          <h2>Add project</h2>
          <button id="addCloseBtn" class="modal-close" aria-label="Close" title="Close">✕</button>
        </div>
        <div class="add-row">
          <input id="addPath" type="text" placeholder="C:/path/to/project folder" autocomplete="off" />
          <button id="browseBtn">Browse…</button>
          <button id="addBtn" class="start">Add</button>
        </div>
        <div id="addError" class="add-error"></div>
        <div id="browsePanel"></div>
        <div id="addSetup"></div>
      </div>
    </div>
    <script type="module" src="/js/main.js"></script>
  </body>
</html>
