<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>local-pm</title>
    <style>
      :root {
        --bg: #0e1116;
        --panel: #161b22;
        --border: #2a3038;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #2f81f7;
        --green: #3fb950;
        --red: #f85149;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: baseline;
        gap: 16px;
      }
      header h1 { margin: 0; font-size: 18px; }
      header a { color: var(--accent); text-decoration: none; }
      main { padding: 16px 24px; }
      .banner {
        background: var(--panel);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        padding: 10px 14px;
        border-radius: 6px;
        margin-bottom: 16px;
      }
      .banner.hidden { display: none; }
      .project { margin-bottom: 20px; }
      .project h2 { font-size: 13px; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; }
      .row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 6px;
      }
      .row.active { border-color: var(--green); }
      .row .branch { font-weight: 600; min-width: 160px; }
      .row .path { color: var(--muted); font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .running { color: var(--green); font-size: 12px; white-space: nowrap; }
      button {
        font: inherit;
        padding: 5px 14px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #21262d;
        color: var(--text);
        cursor: pointer;
      }
      button.start { border-color: var(--accent); }
      button.stop { border-color: var(--red); color: var(--red); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .cmd-form { display: flex; gap: 6px; flex-shrink: 0; }
      .cmd-form input[type="text"] {
        font: inherit;
        padding: 4px 8px;
        background: #010409;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        width: 180px;
      }
      .cmd-form input[type="text"]:focus { outline: none; border-color: var(--accent); }
      .cmd-form input[type="text"]:disabled { opacity: 0.5; }
      .logs {
        margin-top: 24px;
      }
      .logs h2 { font-size: 13px; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; }
      .auth-error {
        background: var(--panel);
        border: 1px solid var(--border);
        border-left: 3px solid var(--red);
        padding: 12px 14px;
        border-radius: 6px;
        color: var(--muted);
      }
      .auth-error code { color: var(--text); }
      pre {
        background: #010409;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
        margin: 0;
        height: 300px;
        overflow: auto;
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .overlay.hidden { display: none; }
      .overlay-panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 32px;
        width: 100%;
        max-width: 400px;
      }
      .overlay-panel h2 { margin: 0 0 8px; font-size: 16px; }
      .overlay-panel p { margin: 0 0 16px; color: var(--muted); font-size: 13px; }
      .overlay-panel input[type="text"] {
        width: 100%;
        font: inherit;
        padding: 8px 10px;
        background: #010409;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        margin-bottom: 12px;
      }
      .overlay-panel input[type="text"]:focus { outline: none; border-color: var(--accent); }
      .overlay-error {
        color: var(--red);
        font-size: 13px;
        margin-bottom: 12px;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <div id="loginOverlay" class="overlay hidden">
      <div class="overlay-panel">
        <h2>local-pm</h2>
        <p>Paste your Bearer token to continue. The full value is printed once when the server first starts.</p>
        <input id="tokenInput" type="text" placeholder="Token" autocomplete="off" />
        <div id="overlayError" class="overlay-error"></div>
        <button id="tokenSubmit" style="width:100%;border-color:var(--accent)">Log in</button>
      </div>
    </div>
    <header>
      <h1>local-pm</h1>
      <span id="lanUrl"></span>
      <span style="flex:1"></span>
      <a id="forgetLink" href="#" style="font-size:13px;color:var(--muted)">forget token</a>
    </header>
    <main>
      <div id="banner" class="banner hidden"></div>
      <div id="projects"></div>
      <div class="logs">
        <h2>Logs</h2>
        <pre id="logs"></pre>
      </div>
    </main>
    <script type="module">
      let inFlight = false;

      const TOKEN_KEY = 'lpm-token';
      let TOKEN = '';

      function getStoredToken() {
        return localStorage.getItem(TOKEN_KEY) ?? '';
      }

      function setStoredToken(value) {
        localStorage.setItem(TOKEN_KEY, value);
        TOKEN = value;
      }

      function clearStoredToken() {
        localStorage.removeItem(TOKEN_KEY);
        TOKEN = '';
      }

      const hashToken = new URLSearchParams(location.hash.slice(1)).get('token');
      if (hashToken) {
        setStoredToken(hashToken);
        history.replaceState(null, '', location.pathname + location.search);
      } else {
        TOKEN = getStoredToken();
      }

      class AuthError extends Error {}

      function authHeaders(extra = {}) {
        return { Authorization: 'Bearer ' + TOKEN, ...extra };
      }

      async function fetchState() {
        const res = await fetch('/api/state', { headers: authHeaders() });
        if (res.status === 401) throw new AuthError('unauthorized');
        return res.json();
      }

      async function post(url, body) {
        inFlight = true;
        render(lastState, true);
        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: authHeaders({ 'Content-Type': 'application/json' }),
            body: body ? JSON.stringify(body) : undefined,
          });
          if (res.status === 401) throw new AuthError('unauthorized');
          lastState = await fetchState();
        } catch (err) {
          if (err instanceof AuthError) return renderAuthError();
          throw err;
        } finally {
          inFlight = false;
          render(lastState);
        }
      }

      function showLoginOverlay(errorMsg = '') {
        document.getElementById('overlayError').textContent = errorMsg;
        document.getElementById('tokenInput').value = '';
        document.getElementById('loginOverlay').classList.remove('hidden');
        document.getElementById('tokenInput').focus();
      }

      function hideLoginOverlay() {
        document.getElementById('loginOverlay').classList.add('hidden');
      }

      async function submitToken() {
        const candidate = document.getElementById('tokenInput').value.trim();
        if (!candidate) {
          document.getElementById('overlayError').textContent = 'Token cannot be empty.';
          return;
        }
        const btn = document.getElementById('tokenSubmit');
        btn.disabled = true;
        try {
          const res = await fetch('/api/state', {
            headers: { Authorization: 'Bearer ' + candidate },
          });
          if (res.status === 401) {
            document.getElementById('overlayError').textContent = 'Invalid token — try again.';
            return;
          }
          if (!res.ok) {
            document.getElementById('overlayError').textContent = 'Server error — try again.';
            return;
          }
          setStoredToken(candidate);
          lastState = await res.json();
          hideLoginOverlay();
          render(lastState);
          startPolling();
        } catch {
          document.getElementById('overlayError').textContent = 'Could not reach server.';
        } finally {
          btn.disabled = false;
        }
      }

      function renderAuthError() {
        if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
        showLoginOverlay('Session expired — please log in again.');
      }

      function groupByProject(worktrees) {
        const map = new Map();
        for (const w of worktrees) {
          if (!map.has(w.project)) map.set(w.project, []);
          map.get(w.project).push(w);
        }
        return map;
      }

      function renderBanner(status) {
        const banner = document.getElementById('banner');
        const c = status.command;
        if (c) {
          banner.classList.remove('hidden');
          if (c.status === 'running') {
            banner.innerHTML = `Running command: ${c.label}… ` +
              `<button class="stop" id="stopCmdBtn">Stop command</button>`;
            banner.querySelector('#stopCmdBtn').onclick = () => post('/api/command/stop');
            return;
          }
          const ok = c.exitCode === 0;
          banner.innerHTML =
            `<span style="color:var(--${ok ? 'green' : 'red'})">` +
            `${ok ? '✓' : '✗'} ${c.label} (exit ${c.exitCode})</span>`;
          return;
        }
        if (status.installing) {
          banner.textContent = 'Installing dependencies…';
          banner.classList.remove('hidden');
        } else if (status.active) {
          const a = status.active;
          banner.textContent = `Running: ${a.branch ?? a.path} (pid ${a.pid})`;
          banner.classList.remove('hidden');
        } else {
          banner.classList.add('hidden');
        }
      }

      function makeCommandButton(w, c, busy) {
        const btn = document.createElement('button');
        btn.textContent = c.label;
        btn.onclick = () => post('/api/command', { path: w.path, cmd: c.cmd, label: c.label });
        btn.disabled = busy;
        return btn;
      }

      function makeFreeFormInput(w, busy) {
        const form = document.createElement('div');
        form.className = 'cmd-form';
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'custom command…';
        input.disabled = busy;
        const btn = document.createElement('button');
        btn.textContent = 'Run';
        btn.disabled = busy;
        function runFreeForm() {
          const value = input.value.trim();
          if (!value) return;
          if (!confirm('Run ' + value + ' in ' + w.branch + '?')) return;
          post('/api/command', { path: w.path, cmd: value, label: value });
        }
        btn.onclick = runFreeForm;
        input.addEventListener('keydown', e => { if (e.key === 'Enter') runFreeForm(); });
        form.appendChild(input);
        form.appendChild(btn);
        return form;
      }

      function makeRow(w, status, busy) {
        const isActive = status.active && status.active.path === w.path;
        const cmdRunning = status.command && status.command.status === 'running';
        const controlsBusy = busy || cmdRunning;
        const row = document.createElement('div');
        row.className = 'row' + (isActive ? ' active' : '');
        row.innerHTML =
          `<span class="branch">${w.branch}</span>` +
          `<span class="path" title="${w.path}">${w.path}</span>`;
        const btn = document.createElement('button');
        if (isActive) {
          row.insertAdjacentHTML('beforeend', '<span class="running">● running</span>');
          btn.className = 'stop';
          btn.textContent = 'Stop';
          btn.onclick = () => post('/api/stop');
        } else {
          btn.className = 'start';
          btn.textContent = 'Start';
          btn.onclick = () => post('/api/start', { path: w.path });
          for (const c of w.commands ?? []) row.appendChild(makeCommandButton(w, c, controlsBusy));
          row.appendChild(makeFreeFormInput(w, controlsBusy));
        }
        btn.disabled = controlsBusy;
        row.appendChild(btn);
        return row;
      }

      function renderProjects(state, busy) {
        const container = document.getElementById('projects');
        container.innerHTML = '';
        for (const [project, worktrees] of groupByProject(state.worktrees)) {
          const section = document.createElement('div');
          section.className = 'project';
          const h2 = document.createElement('h2');
          h2.textContent = project;
          section.appendChild(h2);
          for (const w of worktrees) section.appendChild(makeRow(w, state.status, busy));
          container.appendChild(section);
        }
      }

      function renderLogs(logs) {
        const pre = document.getElementById('logs');
        const atBottom = pre.scrollTop + pre.clientHeight >= pre.scrollHeight - 20;
        pre.textContent = logs.join('\n');
        if (atBottom) pre.scrollTop = pre.scrollHeight;
      }

      function render(state, busy = inFlight) {
        if (!state) return;
        document.getElementById('lanUrl').innerHTML =
          state.status.active
            ? `<a href="${state.lanUrl}" target="_blank">${state.lanUrl}</a>`
            : `<span style="color:var(--muted)">dev url: ${state.lanUrl}</span>`;
        renderBanner(state.status);
        renderProjects(state, busy);
        renderLogs(state.logs);
      }

      let lastState = null;
      let pollingInterval = null;

      async function tick() {
        if (!inFlight) {
          try {
            lastState = await fetchState();
            render(lastState);
          } catch (err) {
            if (err instanceof AuthError) return renderAuthError();
            throw err;
          }
        }
      }

      function startPolling() {
        if (pollingInterval) return;
        tick();
        pollingInterval = setInterval(tick, 2000);
      }

      document.getElementById('tokenSubmit').addEventListener('click', submitToken);
      document.getElementById('tokenInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') submitToken();
      });
      document.getElementById('forgetLink').addEventListener('click', e => {
        e.preventDefault();
        clearStoredToken();
        if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
        showLoginOverlay();
      });

      if (TOKEN) {
        startPolling();
      } else {
        showLoginOverlay();
      }
    </script>
  </body>
</html>
